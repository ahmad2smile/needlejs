<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Needle Tool Calling</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      width: 380px;
      padding: 16px;
      margin: 0;
      background: #fafafa;
    }
    h1 { font-size: 16px; margin: 0 0 12px; color: #111; }
    label { display: block; font-size: 12px; color: #555; margin-bottom: 4px; }
    textarea, input {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid #ddd;
      border-radius: 4px;
      padding: 8px;
      font-size: 13px;
      font-family: inherit;
      resize: vertical;
    }
    textarea { min-height: 60px; }
    button {
      margin-top: 12px;
      width: 100%;
      padding: 9px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      cursor: pointer;
    }
    button:disabled { background: #93c5fd; cursor: not-allowed; }
    #status { margin-top: 8px; font-size: 12px; color: #888; }
    #output {
      margin-top: 12px;
      background: #f0fdf4;
      border: 1px solid #86efac;
      border-radius: 4px;
      padding: 10px;
      font-size: 13px;
      font-family: monospace;
      white-space: pre-wrap;
      display: none;
    }
    #error {
      margin-top: 12px;
      background: #fef2f2;
      border: 1px solid #fca5a5;
      border-radius: 4px;
      padding: 10px;
      font-size: 12px;
      color: #b91c1c;
      display: none;
    }
  </style>
</head>
<body>
  <h1>Needle Tool Calling</h1>

  <label for="query">Query</label>
  <textarea id="query" placeholder="What is the weather in San Francisco?"></textarea>

  <label for="tools" style="margin-top:10px">Tools (JSON array)</label>
  <textarea id="tools" rows="5" placeholder='[{"name":"get_weather","description":"Get weather","parameters":{"location":{"type":"string","description":"City"}}}]'></textarea>

  <button id="run">Run</button>
  <div id="status"></div>
  <div id="output"></div>
  <div id="error"></div>

  <script src="popup.js"></script>
</body>
</html>
